name: CI Testing

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit & component test
        run: npm test -- --watchAll=false

      - name: Run Cypress E2E
        env:
          BROWSER: none
        run: npx start-server-and-test start http://localhost:3000 "npx cypress run"
